name: Relux
options:
  bundleIdPrefix: com.relux
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.3"
  generateEmptyDirectories: true

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0
  OpenMultitouchSupport:
    url: https://github.com/Kyome22/OpenMultitouchSupport
    from: 3.0.3

targets:
  Relux:
    type: application
    platform: macOS
    sources:
      - Sources/Relux
    dependencies:
      - package: KeyboardShortcuts
      - package: OpenMultitouchSupport
    settings:
      base:
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        INFOPLIST_FILE: Sources/Relux/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.relux.app
        PRODUCT_NAME: Relux
        MARKETING_VERSION: "1.11.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        SWIFT_VERSION: "6.0"
        SWIFT_INSTALL_OBJC_HEADER: "NO"
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Relux/Relux-Bridging-Header.h
        HEADER_SEARCH_PATHS: "$(inherited) $(SRCROOT)/Sources/Relux/ISS/include"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
    entitlements:
      path: Sources/Relux/Relux.entitlements
      properties:
        com.apple.security.automation.apple-events: true
