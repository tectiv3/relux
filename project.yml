name: Relux
options:
  bundleIdPrefix: com.relux
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.3"
  generateEmptyDirectories: true

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0

targets:
  ReluxCore:
    type: library.static
    platform: macOS
    sources:
      - Sources/ReluxCore
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_INSTALL_OBJC_HEADER: "NO"

  Relux:
    type: application
    platform: macOS
    sources:
      - Sources/Relux
    dependencies:
      - target: ReluxCore
      - package: KeyboardShortcuts
    settings:
      base:
        INFOPLIST_FILE: Sources/Relux/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.relux.app
        PRODUCT_NAME: Relux
        MARKETING_VERSION: "1.8.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        SWIFT_VERSION: "6.0"
        SWIFT_INSTALL_OBJC_HEADER: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Sources/Relux/Relux.entitlements
      properties:
        com.apple.security.automation.apple-events: true
