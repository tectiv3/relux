name: Relux
options:
  bundleIdPrefix: com.relux
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.3"
  generateEmptyDirectories: true

packages:
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift
    from: 0.30.6
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    from: 2.30.6
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0

targets:
  ReluxCore:
    type: library.static
    platform: macOS
    sources:
      - Sources/ReluxCore
    settings:
      base:
        SWIFT_VERSION: "6.0"

  Relux:
    type: application
    platform: macOS
    sources:
      - Sources/Relux
    dependencies:
      - target: ReluxCore
      - package: mlx-swift
        product: MLX
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXEmbedders
      - package: KeyboardShortcuts
    settings:
      base:
        INFOPLIST_FILE: Sources/Relux/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.relux.app
        PRODUCT_NAME: Relux
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        SWIFT_VERSION: "6.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Sources/Relux/Relux.entitlements
      properties:
        com.apple.security.automation.apple-events: true

  ReluxTool:
    type: tool
    platform: macOS
    sources:
      - Sources/ReluxTool
    dependencies:
      - target: ReluxCore
    settings:
      base:
        SWIFT_VERSION: "6.0"
